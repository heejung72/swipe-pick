server.port=${PORT:8081}
spring.application.name=swipe-pick

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=80MB

# Database (MySQL / MariaDB)
# Railway: MYSQL_HOST, MYSQL_PORT, MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD 자동 주입
# 로컬: localhost:3306/swipepick 사용
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:swipepick}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

upload.dir=${UPLOAD_DIR:uploads}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:5173}
